<svg width="1200" height="320" viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Skill Weaver banner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b0f1a"/>
      <stop offset="55%" stop-color="#0a1a2f"/>
      <stop offset="100%" stop-color="#1b0f2b"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#15f4ee" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#ff7ad9" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#faff6b" stop-opacity="0.9"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="320" fill="url(#bg)"/>

  <g opacity="0.55">
    <path d="M0 70 H1200" stroke="#142338" stroke-width="2"/>
    <path d="M0 140 H1200" stroke="#142338" stroke-width="2"/>
    <path d="M0 210 H1200" stroke="#142338" stroke-width="2"/>
    <path d="M0 280 H1200" stroke="#142338" stroke-width="2"/>
  </g>

  <g filter="url(#softGlow)">
    <rect x="60" y="48" width="1080" height="224" rx="18" ry="18" fill="none" stroke="url(#glow)" stroke-width="2"/>
  </g>

  <text x="90" y="120" fill="#15f4ee" font-family="Verdana, Geneva, sans-serif" font-size="18" letter-spacing="3">SYSTEM / BOOTLINE</text>
  <text x="90" y="175" fill="#e6fbff" font-family="Trebuchet MS, Verdana, sans-serif" font-size="46" font-weight="700">Skill Weaver</text>
  <text x="92" y="214" fill="#9ee8ff" font-family="Verdana, Geneva, sans-serif" font-size="18">cli-skill :: forge a Codex-ready skill from one docs URL</text>

  <circle cx="1030" cy="120" r="6" fill="#ff7ad9"/>
  <circle cx="1060" cy="120" r="6" fill="#15f4ee"/>
  <circle cx="1090" cy="120" r="6" fill="#faff6b"/>
</svg>
