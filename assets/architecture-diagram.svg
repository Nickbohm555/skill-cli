<svg width="1400" height="260" viewBox="0 0 1400 260" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Skill Weaver architecture overview">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b0f1a"/>
      <stop offset="60%" stop-color="#0a1a2f"/>
      <stop offset="100%" stop-color="#1b0f2b"/>
    </linearGradient>
    <linearGradient id="stroke" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#15f4ee"/>
      <stop offset="50%" stop-color="#ff7ad9"/>
      <stop offset="100%" stop-color="#faff6b"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1400" height="260" fill="url(#bg)"/>

  <g opacity="0.4">
    <path d="M0 52 H1400" stroke="#142338" stroke-width="2"/>
    <path d="M0 130 H1400" stroke="#142338" stroke-width="2"/>
    <path d="M0 208 H1400" stroke="#142338" stroke-width="2"/>
  </g>

  <g font-family="Trebuchet MS, Verdana, sans-serif" font-size="16" fill="#e6fbff">
    <g filter="url(#glow)">
      <rect x="40" y="70" width="160" height="120" rx="12" fill="none" stroke="url(#stroke)" stroke-width="2"/>
      <rect x="230" y="70" width="180" height="120" rx="12" fill="none" stroke="url(#stroke)" stroke-width="2"/>
      <rect x="440" y="70" width="200" height="120" rx="12" fill="none" stroke="url(#stroke)" stroke-width="2"/>
      <rect x="670" y="70" width="200" height="120" rx="12" fill="none" stroke="url(#stroke)" stroke-width="2"/>
      <rect x="900" y="70" width="200" height="120" rx="12" fill="none" stroke="url(#stroke)" stroke-width="2"/>
      <rect x="1130" y="70" width="230" height="120" rx="12" fill="none" stroke="url(#stroke)" stroke-width="2"/>
    </g>

    <text x="120" y="120" text-anchor="middle">Docs URL</text>
    <text x="320" y="120" text-anchor="middle">Crawl &amp;</text>
    <text x="320" y="142" text-anchor="middle">Ingestion</text>
    <text x="540" y="120" text-anchor="middle">Content Processing</text>
    <text x="540" y="142" text-anchor="middle">&amp; Attribution</text>
    <text x="770" y="120" text-anchor="middle">Interactive</text>
    <text x="770" y="142" text-anchor="middle">Refinement</text>
    <text x="1000" y="120" text-anchor="middle">Validation</text>
    <text x="1000" y="142" text-anchor="middle">&amp; Gates</text>
    <text x="1245" y="120" text-anchor="middle">Overlap + Install</text>
    <text x="1245" y="142" text-anchor="middle">Approval</text>
  </g>

  <g stroke="#ff7ad9" stroke-width="2" fill="none" marker-end="url(#arrow)">
    <defs>
      <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
        <path d="M0,0 L10,4 L0,8" fill="#ff7ad9" />
      </marker>
    </defs>
    <line x1="200" y1="130" x2="230" y2="130" />
    <line x1="410" y1="130" x2="440" y2="130" />
    <line x1="640" y1="130" x2="670" y2="130" />
    <line x1="870" y1="130" x2="900" y2="130" />
    <line x1="1100" y1="130" x2="1130" y2="130" />
  </g>
</svg>
